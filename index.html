<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    
    <script src="https://email-gateway.dgps.dev/gateway.js"></script>

    <style>
        /* =========================================
           User Provided Styles
           ========================================= */
        :root {
            --neon-green: #10b981;
            --neon-green-hover: #34d399;
            --danger-red: #ef4444;
            --danger-red-hover: #dc2626;
            --warning-gold: #fbbf24;
            --bg-dark: rgba(0, 0, 0, 0.4);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #050517, #062b2b);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.5;
        }

        header {
            background: #000000;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            padding: 24px 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin: 0; font-size: 2.25rem; font-weight: 800; color: var(--neon-green); letter-spacing: -0.025em; }
        .subtitle { margin: 4px 0 0 0; font-size: 0.875rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

        main { flex: 1; padding: 40px 20px; max-width: 800px; margin: 0 auto; width: 100%; box-sizing: border-box; }

        .glass-panel {
            background: var(--bg-dark);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        button { background-color: var(--neon-green); color: #000; border: none; padding: 14px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; font-size: 1.05rem; transition: transform 0.1s, background-color 0.2s; }
        button:hover { background-color: var(--neon-green-hover); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button:disabled { background-color: var(--text-muted); cursor: not-allowed; transform: none; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 8px; color: var(--text-muted); }
        input, textarea { width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(255, 255, 255, 0.05); color: white; box-sizing: border-box; font-family: inherit; transition: all 0.2s ease; font-size: 1rem; }
        input:focus, textarea:focus { outline: none; border-color: var(--neon-green); background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2); }

        @media (max-width: 768px) {
            h1 { font-size: 1.75rem; }
            main { padding: 20px 15px; }
            .glass-panel { padding: 20px; }
        }

        /* =========================================
           Green Tick Animation Styles
           ========================================= */
        .success-wrapper {
            text-align: center;
            padding: 40px 20px;
        }

        .checkmark__circle {
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            stroke-width: 2;
            stroke-miterlimit: 10;
            stroke: var(--neon-green);
            fill: none;
            animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }

        .checkmark {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: block;
            stroke-width: 2;
            stroke: #fff;
            stroke-miterlimit: 10;
            margin: 0 auto 20px auto;
            box-shadow: inset 0px 0px 0px var(--neon-green);
            animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both;
        }

        .checkmark__check {
            transform-origin: 50% 50%;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
        }

        @keyframes stroke { 100% { stroke-dashoffset: 0; } }
        @keyframes scale { 0%, 100% { transform: none; } 50% { transform: scale3d(1.1, 1.1, 1); } }
        @keyframes fill { 100% { box-shadow: inset 0px 0px 0px 40px var(--neon-green); } }
        
        a.nav-link { color: var(--text-muted); text-decoration: none; font-weight: 600; display: inline-block; margin-top: 24px; transition: color 0.2s; }
        a.nav-link:hover { color: var(--text-main); text-decoration: underline; }
    </style>
</head>
<body>

    <header>
        <h1>Send to PC</h1>
        <p class="subtitle">Secure Contact Portal</p>
    </header>

    <main>
        <div class="glass-panel" id="form-container">
            <h2 style="font-size: 1.5rem; font-weight: 700; margin-top: 0; margin-bottom: 24px; color: var(--text-main); border-bottom: 1px solid var(--border-color); padding-bottom: 12px;">Contact Details</h2>
            <form id="contactForm" onsubmit="submitForm(event)">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </div>
                
                <div class="form-group">
                    <label for="reason">Reason of Contact</label>
                    <textarea id="reason" name="reason" rows="5" required placeholder="Type your message here..."></textarea>
                </div>
                
                <button type="submit" id="submitBtn">Send Message</button>
            </form>
        </div>

        <div class="glass-panel" id="success-container" style="display: none;">
            <div class="success-wrapper">
                <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                    <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
                    <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                </svg>
                <h2 style="border-bottom: none; padding-bottom: 0;">Message Sent</h2>
                <p>Your details have been securely forwarded to the PC.</p>
                <a href="#" class="nav-link" onclick="resetForm()">Send another message</a>
            </div>
        </div>
    </main>

    <script>
        function submitForm(event) {
            // Prevent standard form submission
            event.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const name = document.getElementById('name').value;
            const reason = document.getElementById('reason').value;
            
            // Your target Voice email
            const targetEmail = "17323143917.17326261250.PLhFGHTxTw@txt.voice.google.com";
            const subject = "New Contact from " + name;
            const body = "Name: " + name + "\nReason: " + reason;
            
            // UI Feedback during submission
            submitBtn.innerText = 'Sending...';
            submitBtn.disabled = true;

            // Call Vercel Gateway Function
            if (typeof window.sendEmail === 'function') {
                window.sendEmail(targetEmail, subject, body)
                    .then(response => {
                        if (response.success) {
                            // Hide form, show animation
                            document.getElementById('form-container').style.display = 'none';
                            document.getElementById('success-container').style.display = 'block';
                        } else {
                            alert('Delivery failed: ' + response.error);
                            resetButton();
                        }
                    })
                    .catch(error => {
                        alert('Network error while sending the message.');
                        console.error(error);
                        resetButton();
                    });
            } else {
                alert('Email gateway script not loaded. Check your allowed domains setup.');
                resetButton();
            }
        }

        function resetButton() {
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = 'Send Message';
            submitBtn.disabled = false;
        }

        function resetForm() {
            document.getElementById('contactForm').reset();
            resetButton();
            document.getElementById('success-container').style.display = 'none';
            document.getElementById('form-container').style.display = 'block';
        }
    </script>
</body>
</html>
